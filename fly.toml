# fly.toml — TimeManager Pro Reminder Worker
# Deploy: fly deploy

app = "timemanager-worker"
primary_region = "ams"  # Amsterdam — نزدیک‌ترین به ایران/اروپا

[build]
  # از Dockerfile استفاده می‌کنیم

[env]
  LOG_LEVEL = "INFO"
  REMINDER_POLL_INTERVAL_SECS = "30"
  REMINDER_BATCH_SIZE = "50"
  DEFAULT_REMINDER_HOUR = "9"
  STALE_PROCESSING_SECS = "300"
  APP_ENV = "production"
  APP_DEBUG = "false"

# این یک worker است — هیچ HTTP port نیاز ندارد
[processes]
  worker = "python -m worker.reminder_worker"

# بدون HTTP service — فقط worker
[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
