<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TimeManager Pro</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="list"></div>

    <div class="input-container">
        <input type="text" id="title" placeholder="Event Title (e.g. Birthday)">
        <input type="text" id="date" placeholder="YYYY-MM-DD">
        <button onclick="TimeManager.add(document.getElementById('title').value, document.getElementById('date').value)">
            Add Event
        </button>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
