<!DOCTYPE html>
<html lang="fa-IR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3390ec">
  <title>TimeManager Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <noscript>
    <div style="text-align:center; padding:60px 20px; font-family:sans-serif; color:#555">
      <div style="font-size:2rem; margin-bottom:12px">📅</div>
      <p>لطفاً JavaScript را در مرورگر فعال کنید.</p>
      <p style="font-size:0.85rem; color:#999; margin-top:8px">Please enable JavaScript to use TimeManager Pro.</p>
    </div>
  </noscript>

  <header class="app-header">
    <span class="app-icon" aria-hidden="true">📅</span>
    <span class="app-title">TimeManager Pro</span>
  </header>

<main id="list" class="event-list" aria-live="polite" aria-label="Events list"></main>

<button
  type="button"
  id="openComposerBtn"
  class="floating-add-btn"
  aria-label="Open add event form"
>
  ＋ Add event
</button>

<div id="composerOverlay" class="composer-overlay" hidden></div>

<section
  id="composerSheet"
  class="composer-sheet"
  aria-label="Event form"
  aria-hidden="true"
  hidden
>
  <div class="composer-handle" aria-hidden="true"></div>

  <form id="eventForm" class="composer-form" novalidate>
    <label class="sr-only" for="title">Event title</label>
    <input
      type="text"
      id="title"
      placeholder="Event title (e.g. Birthday)"
      maxlength="200"
      autocomplete="off"
      aria-label="Event title"
    >

    <div class="date-row">
      <div class="date-field">
        <label class="date-label" for="date">📅 Gregorian</label>
        <input type="date" id="date" aria-label="Gregorian date">
      </div>

      <div class="date-field">
        <label class="date-label" for="date-jalali">📅 Jalali (شمسی)</label>
        <input
          type="text"
          id="date-jalali"
          placeholder="۱۴۰۴/۰۱/۲۲ یا 1404-01-22"
          maxlength="10"
          inputmode="numeric"
          autocomplete="off"
          aria-label="Jalali date"
          dir="ltr"
        >
      </div>
    </div>

    <div class="meta-row">
      <div class="meta-field">
        <label class="date-label" for="repeat">🔁 Repeat</label>
        <select id="repeat" class="repeat-select" aria-label="Repeat type">
          <option value="none">⏰ One-time reminder</option>
          <option value="daily">🔁 Repeat Daily</option>
          <option value="weekly">🔁 Repeat Weekly</option>
          <option value="monthly">🔁 Repeat Monthly</option>
          <option value="yearly">🎂 Repeat Every Year</option>
        </select>
      </div>

      <div class="meta-field">
        <label class="date-label" for="category">🏷️ Category</label>
        <select id="category" class="repeat-select" aria-label="Event category">
          <option value="general">General</option>
          <option value="birthday">Birthday</option>
          <option value="work">Work</option>
          <option value="family">Family</option>
          <option value="health">Health</option>
          <option value="travel">Travel</option>
          <option value="finance">Finance</option>
          <option value="study">Study</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <label class="pin-toggle" for="pin">
      <input type="checkbox" id="pin" aria-label="Pin event">
      <span>📌 Pin this event to top</span>
    </label>

    <div class="btn-row">
      <button
        type="button"
        id="cancelBtn"
        class="btn-secondary"
        aria-label="Close form"
      >Cancel</button>

      <button
        type="submit"
        id="addBtn"
        class="btn-primary"
        aria-label="Add event"
      >＋ Add</button>
    </div>
  </form>
</section>

  <template id="detailExtrasTemplate">
    <section class="detail-actions" aria-label="Event actions">
      <button type="button" class="btn-secondary detail-action-btn" data-action="share" aria-label="Share event">🔥 Share</button>
      <button type="button" class="btn-secondary detail-action-btn" data-action="pin" aria-label="Pin event">📌 Pin</button>
    </section>

    <section class="detail-notes" aria-label="Event notes">
      <div class="detail-section-head">
        <h3 class="detail-section-title">📝 Notes</h3>
        <span class="detail-section-hint">Write reminders, tasks, or checklists for this event.</span>
      </div>

      <textarea
        class="note-input"
        id="detail-note"
        rows="6"
        maxlength="2000"
        placeholder="Write important tasks for this event..."
        aria-label="Event notes"
      ></textarea>

      <div class="btn-row note-actions">
        <button type="button" class="btn-secondary" id="noteCancelBtn" aria-label="Cancel note changes">Cancel</button>
        <button type="button" class="btn-primary" id="noteSaveBtn" aria-label="Save note">💾 Save note</button>
      </div>
    </section>
  </template>

  <div
    id="toast"
    class="toast"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  ></div>

  <script src="/static/app.js" defer></script>
</body>
</html>
