name: Reminder Worker

on:
  schedule:
    - cron: '*/5 * * * *'   # هر ۵ دقیقه
  workflow_dispatch:          # دکمه Run manually هم داشته باشی

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder worker (max 4 min)
        run: timeout 240 python -m worker.reminder_worker || true
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
          APP_ENV: production
          APP_DEBUG: "false"
          LOG_LEVEL: INFO
          REMINDER_POLL_INTERVAL_SECS: "200"
          REMINDER_BATCH_SIZE: "50"
          DEFAULT_REMINDER_HOUR: "9"
          STALE_PROCESSING_SECS: "300"
